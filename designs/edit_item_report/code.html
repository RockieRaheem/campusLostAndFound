<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">Update Report #LF-2931</h1>

<h3 class="text-lg font-bold mb-4 text-slate-900 dark:text-slate-100">Item Information</h3>
<div class="space-y-4">
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Item Name</span>
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-background-light dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" type="text" value="Blue Nike Water Bottle"/>
</label>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex flex-col gap-2">

<select class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-background-light dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
<option value="electronics">Electronics</option>
<option selected="" value="personal">Personal Items</option>
<option value="clothing">Clothing</option>
<option value="books">Books</option>
</select>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Location Found</span>
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-background-light dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" type="text" value="Main Library, Level 2"/>
</label>
</div>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Description</span>
<textarea class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-background-light dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-3 min-h-[120px] focus:ring-2 focus:ring-primary focus:border-transparent transition-all">Blue 32oz Nike water bottle with a slight scratch on the bottom. Found near the study pods. White logo is slightly faded.</textarea>
</label>
</div>
</div>
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-primary/10 shadow-sm">
<h3 class="text-lg font-bold mb-4 text-slate-900 dark:text-slate-100">Photos</h3>
<div class="flex gap-4">
<div class="relative group size-32 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700">

<span class="material-symbols-outlined text-xs leading-none">close</span>
</button>
</div>
<button class="size-32 rounded-lg border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center gap-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
<span class="text-xs font-medium">Add Photo</span>
</button>
</div>
</div>

<!-- Status Update Card -->

<div class="space-y-6">
<div class="flex flex-col gap-3">
<label class="relative flex items-center p-3 rounded-lg border border-primary bg-primary/5 cursor-pointer">
<input checked="" class="text-primary focus:ring-primary h-4 w-4" name="status" type="radio" value="found"/>
<div class="ml-3">
<span class="block text-sm font-bold text-primary">Marked as Found</span>
<span class="block text-xs text-slate-500">Currently in the office</span>
</div>
</label>
<label class="relative flex items-center p-3 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer transition-all">
<input class="text-primary focus:ring-primary h-4 w-4" name="status" type="radio" value="claimed"/>
<div class="ml-3">
<span class="block text-sm font-bold text-slate-700 dark:text-slate-300">Mark as Claimed</span>
<span class="block text-xs text-slate-500">Item has been returned</span>
</div>
</label>
</div>
<!-- Conditional Field: Visible when Claimed is selected -->
<div class="p-4 bg-primary/10 rounded-lg border border-primary/20 space-y-4">
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-xs font-bold uppercase tracking-wide">Claimed Date</span>
<input class="w-full rounded border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm p-2" type="date" value="2023-11-20"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-xs font-bold uppercase tracking-wide">Claimer ID / Name</span>
<input class="w-full rounded border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm p-2" placeholder="e.g. Student ID or John Doe" type="text"/>

</div>
